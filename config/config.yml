mqtt:
  port: 1883
  # Uncomment to enable WebSocket transport (useful for browser-based clients)
  # websocket_port: 9001

bridge:
  routes:
    # Exact topic match
    - topic: "sensors/temperature"
      url: "https://your-api.example.com/ingest/temperature"
      method: POST
      headers:
        Authorization: "Bearer ${API_TOKEN}"
      timeout: 10000

    # Single-level wildcard: matches sensors/room1/humidity, sensors/kitchen/humidity, etc.
    - topic: "sensors/+/humidity"
      url: "https://your-api.example.com/ingest/humidity"
      method: POST
      headers:
        Authorization: "Bearer ${API_TOKEN}"
        X-Device-ID: "${DEVICE_ID}"

    # Multi-level wildcard: matches devices/any/number/of/levels
    - topic: "devices/#"
      url: "https://your-api.example.com/ingest/devices"
      method: POST
      headers:
        Authorization: "Bearer ${API_TOKEN}"

firebase:
  # Optional: path to a service account JSON file for authentication.
  # If omitted, Application Default Credentials (ADC) are used instead
  # (set GOOGLE_APPLICATION_CREDENTIALS env var to your service account file).
  serviceAccountPath: "./config/serviceAccount.json"
  routes:
    # All sensor messages → "sensor_data" Firestore collection
    - topic: "sensors/#"
      collection: "sensor_data"
    # Device status messages → "device_status" collection
    - topic: "devices/+/status"
      collection: "device_status"

# Speed layer — Firebase Realtime Database (low-latency, latest-value writes)
firebaseRtdb:
  serviceAccountPath: "./config/serviceAccount.json"
  # Replace with your actual Realtime Database URL
  databaseURL: "https://iot-ynov-toulouse-default-rtdb.europe-west1.firebasedatabase.app"
  routes:
    # Latest sensor readings keyed by topic under "sensors/latest"
    - topic: "sensors/#"
      path: "sensors/latest"
    # Latest device status keyed by topic under "devices/status"
    - topic: "devices/+/status"
      path: "devices/status"
